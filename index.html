<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lamecie - Pastry Shop</title>
    <style>
        /* Color Palette */
        :root {
            --beige-arena: #F5EBE6;
            --verde-pistacho: #B7D5AC;
            --rosa-pastel: #F3D1D9;
            --magenta: #D14D72;
            --oscuro: #4A3E3D;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--beige-arena);
            color: var(--oscuro);
            margin: 0;
            padding: 0;
        }

        header {
            background-color: var(--rosa-pastel);
            text-align: center;
            padding: 2rem;
            border-bottom: 5px solid var(--verde-pistacho);
        }

        header h1 {
            font-size: 3rem;
            color: var(--magenta);
            margin: 0;
            font-family: 'Georgia', serif;
        }

        .promo-banner {
            background-color: var(--magenta);
            color: white;
            text-align: center;
            padding: 0.8rem;
            font-weight: bold;
            font-size: 1.1rem;
        }

        .container {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 1rem;
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 2rem;
        }

        @media (max-width: 768px) {
            .container { grid-template-columns: 1fr; }
        }

        h2 {
            color: var(--magenta);
            border-bottom: 2px solid var(--verde-pistacho);
            padding-bottom: 0.5rem;
        }

        .grid-productos {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 1.5rem;
            margin-bottom: 3rem;
        }

        .card {
            background: white;
            border-radius: 12px;
            padding: 1.5rem;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            text-align: center;
            border: 1px solid var(--rosa-pastel);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .card.main-product {
            border: 2px solid var(--magenta);
            background-color: #FFF8F9;
        }

        .badge {
            background-color: var(--magenta);
            color: white;
            padding: 0.2rem 0.6rem;
            border-radius: 20px;
            font-size: 0.8rem;
            display: inline-block;
            margin-bottom: 0.5rem;
        }

        .btn {
            background-color: var(--verde-pistacho);
            color: var(--oscuro);
            border: none;
            padding: 0.6rem 1rem;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.3s;
            margin-top: 1rem;
        }

        .btn:hover {
            background-color: var(--magenta);
            color: white;
        }

        /* Cart & Loyalty Box */
        .sidebar {
            background: white;
            padding: 1.5rem;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            height: fit-content;
        }

        .loyalty-box {
            background-color: var(--beige-arena);
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1.5rem;
            border-left: 5px solid var(--magenta);
        }

            justify-content: space-between;
